<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>大视频上传（预签名 → COS）</title>
  <style>
    :root { font-family: system-ui, sans-serif; }
    body { max-width: 36rem; margin: 1rem auto; padding: 0 1rem; }
    label { display: block; margin-top: 0.75rem; font-size: 0.875rem; color: #333; }
    input[type="text"], input[type="url"] { width: 100%; box-sizing: border-box; padding: 0.5rem; }
    input[type="file"] { margin-top: 0.25rem; }
    button {
      margin-top: 1rem; padding: 0.6rem 1.2rem; cursor: pointer;
      background: #07c160; color: #fff; border: none; border-radius: 6px; font-size: 1rem;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    pre {
      margin-top: 1rem; padding: 0.75rem; background: #f6f6f6; border-radius: 6px;
      font-size: 0.8rem; overflow: auto; white-space: pre-wrap; word-break: break-all;
    }
    .hint { font-size: 0.8rem; color: #666; margin-top: 0.25rem; }
    .err { color: #c00; }
    .auth-box {
      margin-top: 1rem; padding: 0.75rem 1rem; background: #fff8e6; border: 1px solid #f0d090; border-radius: 8px;
    }
    .auth-box strong { color: #a60; }
  </style>
</head>
<body>
  <h1>大视频上传</h1>
  <p class="hint">流程：<strong>申请预签名</strong> → <strong>浏览器 PUT 到 COS</strong> → <strong>通知服务端落库</strong>。请先 <code>POST /participants</code> 登记，再填写编号与 openid。</p>
  <p class="hint">本页与 API 同域时 API 根地址可留空；若前端在别的端口，请填后端基址（如 <code>http://127.0.0.1:5001</code>）并在后端配置 CORS。COS 桶须配置跨域允许 PUT（见 docs/WECHAT_DAY1_RUNBOOK.md §5）。</p>

  <label>API 根地址（留空=当前站点）</label>
  <input type="url" id="apiBase" placeholder="留空使用相对路径，跨域时填 http://127.0.0.1:5001" />

  <div class="auth-box">
    <strong>鉴权（与 .env 里 API_SECRET 一致）</strong>
    <p class="hint" style="margin-top:0.35rem">后端若配置了 <code>API_SECRET</code>，必须填在<strong>下面这一格</strong>；<strong>不要</strong>填进「备注」。</p>
    <label for="apiSecret">API_SECRET</label>
    <input type="text" id="apiSecret" placeholder="与 .env 中 API_SECRET 相同；未配置则可留空" autocomplete="off" spellcheck="false" />
  </div>

  <label>participant_code</label>
  <input type="text" id="code" autocomplete="off" />

  <label>wechat_openid</label>
  <input type="text" id="openid" autocomplete="off" />

  <label>选择视频文件</label>
  <input type="file" id="file" accept="video/*" />

  <label>备注（可选，写入 user_comment）</label>
  <input type="text" id="comment" autocomplete="off" />

  <button type="button" id="btn">开始上传</button>
  <pre id="log"></pre>

  <script>
    function apiRoot() {
      const v = document.getElementById("apiBase").value.trim();
      return v.replace(/\/$/, "");
    }
    function log(msg, isErr) {
      const el = document.getElementById("log");
      const line = (isErr ? "[错误] " : "") + (typeof msg === "string" ? msg : JSON.stringify(msg, null, 2));
      el.textContent += line + "\n";
    }
    function clearLog() {
      document.getElementById("log").textContent = "";
    }

    function apiHeadersJson() {
      const h = { "Content-Type": "application/json" };
      const sec = document.getElementById("apiSecret").value.trim();
      if (sec) h["Authorization"] = "Bearer " + sec;
      return h;
    }

    async function readError(res) {
      const t = await res.text();
      try {
        return JSON.parse(t);
      } catch {
        return t || res.statusText;
      }
    }

    document.getElementById("btn").addEventListener("click", async () => {
      clearLog();
      const base = apiRoot();
      const code = document.getElementById("code").value.trim();
      const openid = document.getElementById("openid").value.trim();
      const fileInput = document.getElementById("file");
      const file = fileInput.files && fileInput.files[0];
      const comment = document.getElementById("comment").value.trim();

      if (!code || !openid) {
        log("请填写 participant_code 与 wechat_openid", true);
        return;
      }
      if (!file) {
        log("请选择文件", true);
        return;
      }

      const btn = document.getElementById("btn");
      btn.disabled = true;
      const mime = file.type || "video/mp4";

      try {
        log("1/3 请求预签名…");
        const presignUrl = (base || "") + "/upload/presign";
        const pr = await fetch(presignUrl, {
          method: "POST",
          headers: apiHeadersJson(),
          body: JSON.stringify({
            participant_code: code,
            wechat_openid: openid,
            content_type: mime,
            file_name: file.name,
            mime: mime,
          }),
        });
        if (!pr.ok) {
          const err = await readError(pr);
          log(err, true);
          if (pr.status === 401) {
            log(
              "请在上方的黄色区域「API_SECRET」输入框填写与 .env 一致的密钥；不要写在「备注」里。若刚改过页面代码，请 Ctrl+F5 强制刷新。",
              true
            );
          }
          if (pr.status === 501) log("服务端未配置 COS_* 环境变量。", true);
          if (pr.status === 404) {
            log(
              "多为「参与者未登记或编号/openid 填错」：请用同一组 participant_code 与 wechat_openid 先 POST /participants，或核对是否与库里完全一致。",
              true
            );
          }
          return;
        }
        const presign = await pr.json();
        log(presign);

        const putUrl = presign.upload_url || presign.url;
        if (!putUrl) {
          log("预签名响应缺少 url / upload_url", true);
          return;
        }

        const putHeaders = { ...(presign.headers || {}) };
        if (!putHeaders["Content-Type"] && !putHeaders["content-type"]) {
          putHeaders["Content-Type"] = mime;
        }

        log("2/3 PUT 上传到 COS…（大文件无进度条，可能需数分钟；可看 F12→Network 里该 PUT 是否 pending）");
        let putRes;
        try {
          putRes = await fetch(putUrl, {
            method: "PUT",
            body: file,
            headers: putHeaders,
          });
        } catch (e) {
          const msg = String(e);
          log(msg, true);
          if (msg.includes("Failed to fetch")) {
            log(
              "多为浏览器跨域：请在 COS 桶 CORS 的 AllowedOrigin 中加入本页来源（同域后端一般为 http://127.0.0.1:5001；前端独立端口则为 http://127.0.0.1:5000 等）。允许 PUT、GET、HEAD、OPTIONS，Allow-Header 含 Content-Type。详见 docs/WECHAT_DAY1_RUNBOOK.md §5。",
              true
            );
            log("也可在 F12 → Console / Network 查看是否出现 CORS policy 字样。", true);
          }
          return;
        }
        if (!putRes.ok) {
          log("COS PUT 失败 HTTP " + putRes.status + " " + (await putRes.text()).slice(0, 500), true);
          return;
        }
        log("COS PUT 成功 HTTP " + putRes.status);

        log("3/3 上报 upload/complete…");
        const completeUrl = (base || "") + "/upload/complete";
        const cr = await fetch(completeUrl, {
          method: "POST",
          headers: apiHeadersJson(),
          body: JSON.stringify({
            participant_code: code,
            wechat_openid: openid,
            source: "h5",
            object_key: presign.object_key,
            file_name: file.name,
            size_bytes: file.size,
            mime: mime,
            user_comment: comment || undefined,
          }),
        });
        if (!cr.ok) {
          const errC = await readError(cr);
          log(errC, true);
          if (cr.status === 401) {
            log("同上：在黄色区域填写 API_SECRET（与 .env 一致）。", true);
          }
          return;
        }
        const done = await cr.json();
        log("完成：");
        log(done);
      } catch (e) {
        log(String(e), true);
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
